    <script>
        const speciesData = [
            // 1. Хомяк обыкновенный
            {
                group: 'Настоящие хомяки (Cricetinae)',
                nameRu: 'Хомяк обыкновенный', nameLat: 'Cricetus cricetus', domestic: false,
                photos: { wild: 'images/common_hamster_wild.jpg', zoo: 'images/common_hamster_zoo.jpg', home: null },
                map: 'images/common_hamster_map.png',
                sectionsFull: [
                    { id: 'systematics', title: 'Систематика и этимология', content: '<p>Вид описан Карлом Линнеем в 1758 году как <em>Mus cricetus</em>. Позднее выделен в монотипический род Cricetus. Название «хомяк» происходит от древне-иранского *hamaēstar — «враг, который повергает на землю», что связано с привычкой грызуна нагибать колосья для добычи зёрен. Ближайший родственник — хомяк южнорусский (Cricetus raddei).</p><p><strong>История изучения:</strong> Первое научное описание датируется 1758 годом (Линней, 10-е издание Systema Naturae). В XIX веке вид активно изучался российскими зоологами: Паллас, Северцов, Богданов уточняли границы ареала и экологию. В XX веке особое внимание привлекло катастрофическое сокращение численности, что стимулировало современные генетические и природоохранные исследования.</p>' },
                    { id: 'evolution', title: 'Эволюция и генетика', content: '<p>Род Cricetus обособился в среднем плейстоцене (около 0,5–1 млн лет назад). Ископаемые остатки известны из отложений возрастом до 2 млн лет. В плейстоцене ареал был значительно шире, охватывая Западную Европу. Генетические исследования митохондриальной ДНК подтверждают монофилию рода и его близость к средним хомякам (Mesocricetus, Allocricetulus). Кариотип 2n=22. Хромосомный набор состоит из крупных метацентриков, что считается примитивным признаком для хомяков. Сравнение с южнорусским хомяком (2n=26) указывает на хромосомные перестройки (робертсоновские слияния), сопровождавшие видообразование.</p>' },
                    { id: 'appearance', title: 'Внешний вид и анатомия', content: '<p>Длина тела 25–34 см, хвоста 3–8 см, масса в среднем 700 г. Мех густой, окрас контрастный: спина рыжевато-бурая, брюхо чёрное с белыми пятнами на боках. Защёчные мешки вмещают до 50 г пищи. Череп массивный, с широкими скулами. Конечности короткие, передние лапы с мощными когтями, приспособленными для рытья.<br><strong>Сравнение с южнорусским хомяком:</strong> От C. raddei отличается более крупными размерами, яркой окраской (у южнорусского брюхо не чёрное, а сероватое), а также деталями строения черепа и зубов.</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Степная и лесостепная зоны Евразии от Бельгии до Алтая. Предпочитает чернозёмы, поля зерновых, речные долины. В горы поднимается до 1500 м. В настоящее время ареал сильно фрагментирован, особенно в Западной Европе.</p>' },
                    { id: 'wild', title: 'В дикой природе', content: '<p>В дикой природе обыкновенный хомяк населяет открытые ландшафты с глубокими почвами. Ведёт строго одиночный образ жизни, занимая индивидуальный участок площадью до 0,5 га. Его норы — сложные инженерные сооружения глубиной до 2,5 м и протяжённостью ходов до 8 м, с отдельными камерами для гнезда, запасов (до 5–6 кладовых) и дефекации. Входы в нору диаметром 6–10 см обычно располагаются под прикрытием растительности. Плотность популяции в благоприятных местообитаниях может достигать 10–20 особей на гектар, однако сейчас упала до менее чем 1 особи на гектар во многих регионах.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Строго одиночный территориальный вид. Активен ночью и в сумерках, хотя в сезон размножения и при заготовке зимних запасов может быть активен круглосуточно. Запасает до 20 кг зерна. Впадает в спячку на 180–210 дней (с октября по март). Во время спячки температура тела падает до 4–7°C, дыхание сокращается до 2–13 вдохов в минуту. Самцы залегают в спячку раньше самок (в конце августа), взрослые самки — в сентябре, молодняк — в октябре.</p><p><strong>Химическая коммуникация:</strong> У хомяков имеются парные боковые железы (на боках), выделяющие маслянистый секрет с индивидуальным запахом. Самцы метят территорию, нанося секрет на камни, стебли растений и стенки нор. Запаховая метка сохраняется до 3–5 дней. В период течки самки оставляют пахучий след, привлекающий самцов. Исследования показали, что самцы способны различать по запаху возраст, пол и репродуктивный статус другой особи.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Всеяден. Основа рациона — семена злаков, бобовые, корнеплоды, зелень. Дополнительно поедает насекомых, моллюсков, иногда мелких позвоночных. Суточная потребность в энергии около 100 ккал. Исследования показали, что монодиета из кукурузы вызывает дефицит витамина B3, что приводит к каннибализму и снижению репродуктивного успеха. В зимний период питается исключительно запасами.</p>' },
                    { id: 'reproduction', title: 'Размножение и жизненный цикл', content: '<p>Полигинный вид: самец посещает норы нескольких самок. Сезон размножения с апреля по август. Беременность 18–20 дней. В помёте 4–15 детёнышей (обычно 8–10). За сезон самка приносит 2–3 выводка. Половая зрелость наступает в возрасте около 43 дней. Продолжительность жизни в природе 2–3 года, в неволе до 5 лет.</p><p><strong>Продолжительность жизни:</strong> В дикой природе большинство особей живёт 1–2 года, но отдельные экземпляры доживают до 3 лет. В неволе при правильном содержании (без спячки) рекордная продолжительность жизни составляет 8 лет. Основные факторы смертности в природе — хищники, болезни и нехватка корма в зимний период.</p>' },
                    { id: 'health', title: 'Паразиты и болезни', content: '<p>Обыкновенный хомяк является хозяином для нескольких видов гельминтов (цестоды, нематоды), блох и клещей. Зарегистрированы случаи туляремии и лептоспироза. Вспышки численности паразитов могут приводить к локальному снижению популяции. Инбридинг в изолированных популяциях увеличивает восприимчивость к инфекциям.</p>' },
                    { id: 'ecosystem', title: 'Роль в экосистеме', content: '<p>Обыкновенный хомяк является ключевым компонентом степных экосистем. Его роющая деятельность аэрирует почву, улучшая водопроницаемость и перемешивая горизонты. Запасы семян, оставшиеся неиспользованными, прорастают и способствуют возобновлению растительности. Вид служит важной кормовой базой для хищников: лисицы, степного орла, филина, хорьков. Таким образом, исчезновение хомяка приводит к каскадным эффектам в пищевых цепях.</p>' },
                    { id: 'status', title: 'Статус сохранения', content: '<p>Красный список МСОП: на грани исчезновения (CR). Угрозы: распашка земель, пестициды, охота.</p>' },
                    { id: 'conservation', title: 'Причины вымирания и борьба за сохранение', content: '<p><strong>Причины вымирания:</strong> Начиная с 1980-х годов популяция сократилась более чем на 75% из-за интенсификации сельского хозяйства, фрагментации местообитаний и изменения климата. Особенно критична ситуация в Западной Европе.</p><p><strong>Меры по спасению:</strong> Действуют масштабные программы реинтродукции. Проект LIFE Cricetus с бюджетом более 12 млн евро объединяет усилия Бельгии, Нидерландов и Германии по разведению и выпуску хомяков в природу, созданию экологических коридоров и внедрению методов земледелия, совместимых с выживанием вида. В Лейпцигском зоопарке работает специализированная станция разведения, а украинские биологи реализуют программу реинтродукции в степной зоне.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Требует вольер от 2 м² с грунтом. Агрессивен, не подходит как домашний питомец. В зоопарках содержится редко. Важна имитация спячки.</p>' },
                    { id: 'facts', title: 'Интересные факты', content: '<ul><li>В одной норе находили до 90 кг запасов.</li><li>Может переплывать реки.</li><li>При опасности громко кричит и стучит зубами.</li></ul>' }
                ],
                sectionsShort: [
                    { id: 'systematics', title: 'Систематика', content: '<p>Вид описан в 1758 году Линнеем. Относится к монотипическому роду Cricetus. Ближайший родственник — хомяк южнорусский (Cricetus raddei).</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Обитает в степной и лесостепной зонах Евразии от Бельгии до Алтая и Северного Казахстана. Предпочитает чернозёмные почвы, поля зерновых, луга, речные долины и балки, часто селится у людских поселений.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина тела 25–34 см, хвоста 3–8 см, масса в среднем 700 г. Мех густой, окрас контрастный: спина рыжевато-бурая, брюхо чёрное с белыми пятнами на боках. Морда умеренной длины, защёчные мешки вмещают до 50 г пищи.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Строго одиночный территориальный вид. Активен ночью и в сумерках. Роет сложные норы глубиной до 2,5 м и длиной до 8 м с гнездовой камерой и кладовыми. Запасает до 15–20 кг зерна. Впадает в спячку с октября по март.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Всеяден. Основа рациона — семена злаков, бобовые, корнеплоды, зелень. Дополнительно поедает насекомых, моллюсков, иногда мелких позвоночных.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Сезон размножения с апреля по август. Беременность 18–20 дней. В помёте 4–15 детёнышей (обычно 8–10). За сезон самка приносит 2–3 выводка. Половая зрелость наступает в 2 месяца.</p>' },
                    { id: 'status', title: 'Статус сохранения', content: '<p>Красный список МСОП: вид на грани исчезновения (CR). Основные угрозы: распашка земель, применение пестицидов, прямое преследование. В ряде стран Европы созданы программы реинтродукции.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Требует очень просторного вольера (минимум 2 м²) с толстым слоем грунта. Агрессивен, не подходит как домашний питомец. В зоопарках содержится редко.</p>' },
                    { id: 'facts', title: 'Интересные факты', content: '<ul><li>В одной норе находили запасы более 80 кг зерна.</li><li>Может переплывать небольшие реки.</li><li>При опасности громко кричит и стучит зубами.</li></ul>' }
                ]
            },
            // 2. Хомяк сирийский
            {
                group: 'Настоящие хомяки (Cricetinae)',
                nameRu: 'Хомяк сирийский', nameLat: 'Mesocricetus auratus', domestic: true,
                photos: { wild: 'images/syrian_wild.jpg', zoo: 'images/syrian_zoo.jpg', home: 'images/syrian_home.jpg' },
                map: null,
                sectionsFull: [
                    { id: 'systematics', title: 'Систематика и этимология', content: '<p>Описан Джорджем Уотерхаусом в 1839 году. Родовое название Mesocricetus означает «средний хомяк». Видовой эпитет auratus переводится как «золотистый». Относится к роду средних хомяков вместе с турецким и румынским.</p><p><strong>История одомашнивания:</strong> Все домашние сирийские хомяки происходят от одной самки и трёх её детёнышей, пойманных в 1930 году зоологом Израэлем Ахарони близ Алеппо. Это один из немногих случаев, когда домашняя популяция ведёт начало от столь ограниченного числа основателей. В лабораторной практике используется с 1930-х годов.</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Эндемик плато Алеппо в Сирии и южной Турции. Обитает на сухих каменистых склонах с кустарниковой растительностью. Ареал крайне ограничен.</p>' },
                    { id: 'appearance', title: 'Внешний вид и анатомия', content: '<p>Длина тела 12–18 см, хвост 13–21 мм, масса 100–175 г. Природный окрас — золотистый с серовато-белым брюхом. Селекционно выведены десятки окрасов: длинношёрстный, сатин, рекс, чёрный, белый, черепаховый и др. Глаза чёрные, за исключением альбиносных форм. Защёчные мешки простираются до плеч.<br><strong>Сравнение с турецким хомяком:</strong> M. brandti крупнее (до 150 мм) и темнее, с чёрным пятном на груди.</p>' },
                    { id: 'wild', title: 'В дикой природе', content: '<p>В дикой природе сирийский хомяк населяет засушливые каменистые склоны и кустарниковые заросли плато Алеппо. Ведёт ночной образ жизни, выкапывая глубокие норы (до 2 м) с прохладным микроклиматом, что позволяет выживать в жарком климате. Это одиночное территориальное животное: каждый взрослый зверёк защищает свой участок от сородичей, а драки нередко заканчиваются летально. В спячку не впадает, но в холодные периоды активность снижает. В природе продолжительность жизни составляет 1,5–2 года.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Строго одиночный, ночной и сумеречный вид. Самцы и самки встречаются только для спаривания. Территориален: при встрече с сородичами драки заканчиваются летально. В неволе требует клетку площадью от 0,24 м² (60×40 см) и колесо диаметром от 28 см. При лабораторных низких температурах может впадать в оцепенение.<br><strong>Химическая коммуникация:</strong> Боковые железы выделяют пахучий секрет для мечения территории. Самки сигнализируют о течке через запах вагинальных выделений.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Всеяден. Основу рациона составляют семена, орехи и насекомые, включая муравьёв, мух, тараканов и ос. В неволе рекомендуется зерносмесь без сахара с добавлением сушёных овощей, зелени и насекомых. Избыток жиров и простых углеводов ведёт к ожирению и диабету.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Самка сигнализирует о готовности к спариванию через ольфакторные сигналы в вагинальных выделениях. Овуляция индуцируется длинным фотопериодом (>12,5 ч). Беременность длится 16 дней — самая короткая среди плацентарных млекопитающих. В помёте 8–12 детёнышей (рекорд — до 20). Детёныши открывают глаза на 12–14 день. Самца отсаживают сразу после спаривания. Половая зрелость наступает в возрасте 4–5 недель, но спаривать рекомендуется с 3–4 месяцев.</p>' },
                    { id: 'health', title: 'Паразиты и болезни', content: '<p>Предрасположен к ожирению, сахарному диабету, опухолям (особенно надпочечников). Частые инфекции: пролиферативный илеит («мокрый хвост»), респираторные заболевания. Средняя продолжительность жизни 2–3 года. В дикой природе поражается гельминтами и эктопаразитами.</p>' },
                    { id: 'genetics', title: 'Генетика и селекция', content: '<p>Кариотип 2n=44. Известно множество мутаций: длинная шерсть (Llglg), сатин (Satin), рекс (Rex), чёрный окрас (aa), коричный (pp), альбинос (cc) и др. На основе этих генов получено более 40 комбинаций окрасов.</p>' },
                    { id: 'ecosystem', title: 'Роль в экосистеме', content: '<p>В природе — звено пищевых цепей: добыча для лисиц, шакалов, сов. Роющая деятельность способствует аэрации почвы. Однако из-за крайне низкой численности в дикой природе его экосистемная роль минимальна.</p>' },
                    { id: 'conservation', title: 'Причины вымирания и борьба за сохранение', content: '<p>В дикой природе сирийский хомяк классифицирован как вымирающий вид (Endangered) по классификации МСОП. Основная угроза — разрушение среды обитания из-за расширения сельскохозяйственных угодий и преднамеренного уничтожения человеком. Ареал вида крайне ограничен и продолжает сокращаться. В отличие от обыкновенного хомяка, масштабных программ по сохранению дикой популяции сирийского хомяка не существует, что делает его положение особенно уязвимым.</p>' },
                    { id: 'facts', title: 'Интересные факты', content: '<ul><li>Все домашние сирийские хомяки — потомки одной самки и трёх её детёнышей, пойманных в 1930 году.</li><li>Защёчные мешки могут растягиваться до плеч.</li><li>Используется как модель для изучения диабета и старения.</li></ul>' }
                ],
                sectionsShort: [
                    { id: 'systematics', title: 'Систематика', content: '<p>Вид описан в 1839 году Уотерхаусом. Относится к роду средних хомяков (Mesocricetus). Все одомашненные особи происходят от одной самки и трёх её детёнышей, пойманных в 1930 году в Сирии.</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Эндемик плато Алеппо в Сирии и южной Турции. Обитает на сухих каменистых склонах с кустарниковой растительностью. Ареал крайне ограничен.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина тела 12–18 см, хвост 13–21 мм, масса 100–175 г. Природный окрас — золотистый с серовато-белым брюхом. Селекционно выведены десятки окрасов: длинношёрстный, сатин, рекс, чёрный, белый, черепаховый и др. Глаза чёрные, за исключением альбиносных форм.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Строго одиночный, территориальный. Активен ночью. В природе выкапывает норы до 2 м глубиной. В неволе требует клетку площадью не менее 0,24 м² (60×40 см) и колесо диаметром от 28 см. При совместном содержании взрослые особи дерутся до смерти.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Зерноядный вид. Основу рациона составляет зерносмесь без сахара и красителей, с добавлением сушёных овощей, зелени, насекомых. Важно ограничивать долю жиров и простых углеводов во избежание ожирения и диабета.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Беременность 16–18 дней. В помёте 6–12 детёнышей. Самка выкармливает их до 21–28 дней. Самца отсаживают сразу после спаривания. Половая зрелость наступает в возрасте 4–5 недель, но спаривать рекомендуется с 3–4 месяцев.</p>' },
                    { id: 'health', title: 'Здоровье и болезни', content: '<p>Предрасположен к ожирению, сахарному диабету, опухолям (особенно надпочечников). Частые инфекции: пролиферативный илеит (мокрый хвост), респираторные заболевания. Средняя продолжительность жизни 2–3 года.</p>' },
                    { id: 'genetics', title: 'Генетика и селекция', content: '<p>Кариотип 2n=44. Известно множество мутаций: длинная шерсть (Llglg), сатин (Satin), рекс (Rex), чёрный окрас (aa), коричный (pp), альбинос (cc) и др. На основе этих генов получено более 40 комбинаций окрасов.</p>' },
                    { id: 'facts', title: 'Интересные факты', content: '<ul><li>Все домашние сирийские хомяки — потомки одной самки и трёх её детёнышей, пойманных в 1930 году.</li><li>Защёчные мешки могут растягиваться до плеч.</li><li>В лабораториях используется как модель для изучения диабета и старения.</li></ul>' }
                ]
            },
            // 3. Хомяк турецкий
            {
                group: 'Настоящие хомяки (Cricetinae)',
                nameRu: 'Хомяк турецкий', nameLat: 'Mesocricetus brandti', domestic: false,
                photos: { wild: 'images/brandti_wild.jpg', zoo: null, home: null },
                map: null,
                sectionsFull: [
                    { id: 'systematics', title: 'Систематика и этимология', content: '<p>Описан Нерингом в 1898 году. Видовое название дано в честь Иоганна Фридриха Брандта. Также известен как хомяк Брандта или закавказский хомяк.</p><p><strong>Сравнение с сирийским хомяком:</strong> Крупнее (до 150 мм), темнее, с чёрным пятном на груди. Кариотип 2n=42 (у сирийского 2n=44).</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Горные степи Турции, Армении, Грузии, Ирана на высотах 300–3000 м. Предпочитает сухие каменистые склоны и участки с кустарниками.</p>' },
                    { id: 'appearance', title: 'Внешний вид и анатомия', content: '<p>Длина тела до 150 мм, хвоста до 39 мм, вес 42–296 г. Окрас верха буровато-палевый, брюхо от белого до пепельно-серого, на груди между передними лапами чёрное пятно.</p>' },
                    { id: 'wild', title: 'В дикой природе', content: '<p>В дикой природе турецкий хомяк населяет горные степи и каменистые склоны Анатолии, Кавказа и северо-западного Ирана. Ведёт одиночный ночной образ жизни, выкапывая норы с кладовыми. Зимой впадает в спячку на 4–5 месяцев (с октября по март). Известен своей агрессивностью по сравнению с другими видами хомяков. Продолжительность жизни в природе около 2 лет. В ряде регионов рассматривается как вредитель сельского хозяйства, но также используется в качестве лабораторного животного.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Преимущественно ночной одиночный образ жизни. Более агрессивен, чем другие представители семейства Cricetidae. Спячка длится 4–5 месяцев. Продолжительность жизни в природе около 2 лет.<br><strong>Химическая коммуникация:</strong> Вероятно, использует запаховые метки, но детально не изучена.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Довольно разнообразный рацион: питается преимущественно зерновыми и травами. Иногда поедает насекомых и других беспозвоночных. Запасает корни и листья в норах для зимовки. При недостатке зерна переходит на зелёные овощи, но при этом теряет в весе.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Беременность около 17–18 дней, в помёте 3–10 детёнышей. Сезон размножения с весны до осени. Самцы и самки встречаются только для спаривания, после чего расстаются.</p>' },
                    { id: 'status', title: 'Статус сохранения', content: '<p>Вид недостаточно изучен, но ареал сокращается из-за распашки земель. Охраняется в ряде заповедников Турции и Армении. МСОП относит вид к категории «близкий к уязвимому положению» (Near Threatened).</p>' },
                    { id: 'parasites', title: 'Паразиты и болезни', content: '<p>Данные ограничены. Вероятно, подвержен гельминтам и эктопаразитам, как и другие виды Mesocricetus.</p>' },
                    { id: 'ecosystem', title: 'Роль в экосистеме', content: '<p>Является добычей для хищных птиц и млекопитающих. Роющая деятельность влияет на почвенную структуру.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Содержится редко. Требует условий, сходных с сирийским хомяком. Разведение в неволе затруднено из-за необходимости имитации зимней спячки.</p>' }
                ],
                sectionsShort: [
                    { id: 'systematics', title: 'Систематика', content: '<p>Вид описан в 1898 году Нерингом. Относится к роду средних хомяков (Mesocricetus). Также известен как хомяк Брандта или закавказский хомяк.</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Горные степи Турции, Армении, Грузии, Ирана. Предпочитает сухие каменистые склоны и участки с кустарниками на высотах 300–3000 м.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина тела до 150 мм, хвоста до 39 мм, вес 42–296 г. Окрас верха буровато-палевый, брюхо от белого до пепельно-серого, на груди между передними лапами чёрное пятно. Похож на сирийского хомяка, но крупнее и темнее.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Ведёт преимущественно ночной образ жизни. По натуре одиночка. На зиму залегает в спячку в конце октября — начале декабря, пробуждается в марте-апреле. Продолжительность жизни в природе около 2 лет.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Питается семенами, зелёными частями растений, корнеплодами, насекомыми.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Беременность около 17–18 дней. В помёте 3–10 детёнышей. Сезон размножения с весны до осени.</p>' },
                    { id: 'status', title: 'Статус сохранения', content: '<p>Вид недостаточно изучен, но ареал сокращается из-за распашки земель.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Содержится редко. Требует условий, сходных с сирийским хомяком.</p>' }
                ]
            },
            // 4. Хомяк румынский
            {
                group: 'Настоящие хомяки (Cricetinae)',
                nameRu: 'Хомяк румынский', nameLat: 'Mesocricetus newtoni', domestic: false,
                photos: { wild: 'images/newtoni_wild.jpg', zoo: null, home: null },
                map: null,
                sectionsFull: [
                    { id: 'systematics', title: 'Систематика и этимология', content: '<p>Описан в 1898 году. Эндемик Добруджи. Сравнение с сирийским: меньше (135–160 мм), спина серо-коричневая, кариотип 2n=38.</p>' },
                    { id: 'habitat', title: 'Ареал', content: '<p>Низменности Болгарии и Румынии. Сухие степи, поля.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина 135–160 мм, вес 60–130 г. Спина серо-коричневая, брюхо белое.</p>' },
                    { id: 'wild', title: 'В дикой природе', content: '<p>Одиночный, сумеречный. Норы с гнездовой камерой на 50–60 см. Самцы запасают до 800 г корма.</p>' },
                    { id: 'behavior', title: 'Поведение', content: '<p>Активен в сумерках. Запасы до 3 кг растительности.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Семена, бобовые, корнеплоды, трава, насекомые.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Апрель–август. Беременность 15 дней, 1–12 детёнышей. Продолжительность жизни до 2 лет.</p>' },
                    { id: 'status', title: 'Статус', content: '<p>МСОП: Vulnerable. Угроза — сельское хозяйство.</p>' },
                    { id: 'captivity', title: 'Содержание', content: '<p>Практически не содержится.</p>' }
                ],
                sectionsShort: [
                    { id: 'systematics', title: 'Систематика', content: '<p>Вид описан в 1898 году Нерингом. Относится к роду средних хомяков (Mesocricetus). Также известен как черногрудый золотистый хомяк, добруджанский хомяк или ньютонов хомяк.</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Эндемик низменностей северной Болгарии и Румынии. Населяет сухие степи, каменистые склоны, поля люцерны и пшеницы, виноградники на высотах до 460 м.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина тела 135–160 мм, хвоста 17–24 мм, вес 60–130 г. Спина светло-серо-коричневая, брюхо белое. Общая форма тела как у других представителей рода Mesocricetus.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Ведёт одиночный, сумеречный и ночной образ жизни. Создаёт норы с несколькими входами, спальней и кладовой. Гнездовая камера располагается на глубине около 50–60 см.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Вид всеядный, рацион состоит из зелёных частей растений, семян, плодов, небольших позвоночных и беспозвоночных.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Сезон размножения с апреля по август. Беременность около 18 дней. В помёте 4–10 детёнышей.</p>' },
                    { id: 'status', title: 'Статус сохранения', content: '<p>Охраняется на национальном уровне. Находится под угрозой из-за сельскохозяйственного освоения земель.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Данных о содержании в неволе мало.</p>' }
                ]
            },
            // 5. Хомяк Эверсмана
            {
                group: 'Средние хомяки (Allocricetulus)',
                nameRu: 'Хомяк Эверсмана', nameLat: 'Allocricetulus eversmanni', domestic: false,
                photos: { wild: 'images/eversmanni_wild.jpg', zoo: null, home: null },
                map: null,
                sectionsFull: [
                    { id: 'systematics', title: 'Систематика и этимология', content: '<p>Описан Брандтом в 1859 году. Назван в честь Э.А. Эверсмана. Сравнение с монгольским хомяком: крупнее (до 160 мм), кариотип 2n=26 против 2n=20.</p>' },
                    { id: 'habitat', title: 'Ареал', content: '<p>Степи от Волги до Алтая, Казахстан, Синьцзян. Ковыльные степи, выгоны.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина 103–136 мм, хвост 20–31 мм, вес 32–68 г. Серовато-бурый, чёрное пятно на груди.</p>' },
                    { id: 'wild', title: 'В дикой природе', content: '<p>Ночной. Норы глубиной 20–30 см. Зимняя спячка. Охотится на ящериц и мелких грызунов.</p>' },
                    { id: 'behavior', title: 'Поведение', content: '<p>Сумеречный и ночной. Активность 19:00–04:00. Запасает корм. Коммуникация мало изучена.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Семена, насекомые, моллюски, иногда ящерицы и птицы.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Апрель–сентябрь. 2–4 помёта по 3–7 детёнышей. Беременность 18–20 дней.</p>' },
                    { id: 'status', title: 'Статус', content: '<p>МСОП: LC. В некоторых регионах России в Красной книге.</p>' },
                    { id: 'captivity', title: 'Содержание', content: '<p>Редок. Требует просторный вольер с субстратом.</p>' }
                ],
                sectionsShort: [
                    { id: 'systematics', title: 'Систематика', content: '<p>Вид описан в 1859 году Брандтом. Относится к роду средних хомяков (Allocricetulus). Видовое название дано в честь Эдуарда Александровича Эверсмана (1794–1860).</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Степи и полупустыни от Нижней Волги до Алтая, Казахстан. Предпочитает целинные ковыльные степи, но также встречается на полях, выгонах, бахчах и в поселениях человека.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина тела 136–160 мм, хвоста 20–28 мм. Мелкий грызун, размером заметно крупнее мыши. Лапы короткие, морда слабоприострённая, уши небольшие.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Ведёт преимущественно сумеречный и ночной образ жизни. Живёт в сравнительно просто устроенных норах глубиной 20–30 см. Зиму проводит в спячке.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Питается всходами и зерном пшеницы, ржи, овса, а также семенами диких растений и насекомыми.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Сезон размножения с апреля по август. За лето 2–3 помёта по 4–8 детёнышей.</p>' },
                    { id: 'status', title: 'Статус сохранения', content: '<p>В ряде регионов вид занесён в Красную книгу.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Содержится редко. Требует просторного вольера с толстым слоем субстрата.</p>' }
                ]
            }
                        ,
            // 6. Хомяк монгольский
            {
                group: 'Средние хомяки (Allocricetulus)',
                nameRu: 'Хомяк монгольский', nameLat: 'Allocricetulus curtatus', domestic: false,
                photos: { wild: 'images/curtatus_wild.jpg', zoo: 'images/curtatus_zoo.jpg', home: null },
                map: null,
                sectionsFull: [
                    { id: 'systematics', title: 'Систематика и этимология', content: '<p>Описан Алленом в 1925 году. Видовой эпитет curtatus означает «укороченный» — возможно, из-за относительно короткого хвоста. Ранее считался подвидом хомяка Эверсмана, но генетические и морфологические исследования подтвердили его видовую самостоятельность. Кариотип 2n=20.</p><p><strong>История изучения:</strong> Впервые обнаружен в Монголии. Долгое время был малоизвестен; только в конце XX века получил статус отдельного вида.</p><p><strong>Сравнение с хомяком Эверсмана:</strong> Меньше (до 130 мм), светлее, без тёмного пятна на груди. Кариотип 2n=20 против 2n=26 у эверсмана.</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Полупустыни Монголии и Северного Китая (Внутренняя Монголия, Ганьсу, Нинся, Синьцзян). Предпочитает гравийные равнины и закреплённые пески, часто селится в брошенных норах песчанок.</p>' },
                    { id: 'appearance', title: 'Внешний вид и анатомия', content: '<p>Длина тела 100–130 мм, хвоста 16–26 мм, масса 30–65 г. Окраска бледно-жёлтая, брюхо и лапы белые. Тёмное пятно на груди отсутствует, волосяной покров ровный. Кариотип 2n=20.</p>' },
                    { id: 'wild', title: 'В дикой природе', content: '<p>Ведёт ночной образ жизни, активен круглый год. Живёт в простых норах с 1–2 камерами. Питается в основном семенами и насекомыми, иногда охотится на ящериц. Размножение в мае–июле, за сезон самка приносит 2–3 помёта по 4–14 детёнышей. Детали экологии изучены слабо.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Ночной, одиночный. В спячку, вероятно, не впадает. Коммуникация не изучена.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Основу рациона составляют семена и насекомые, изредка ящерицы. Соотношение питательных веществ в естественном корме: клетчатка 9%, протеин 23%, жиры 8%.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Сезон размножения в мае–июле. Беременность 17–20 дней, в помёте 4–14 детёнышей (в среднем 7–8). Детёныши рождаются слепыми и голыми; на 14–16 день покрываются шерстью и открывают глаза.</p>' },
                    { id: 'status', title: 'Статус сохранения', content: '<p>МСОП: вызывающий наименьшие опасения (LC). Вид недостаточно изучен, потенциальные угрозы — перевыпас скота и засухи.</p>' },
                    { id: 'parasites', title: 'Паразиты и болезни', content: '<p>Данные практически отсутствуют. Вероятно, подвержен заражению гельминтами и эктопаразитами, как и другие грызуны полупустынь.</p>' },
                    { id: 'ecosystem', title: 'Роль в экосистеме', content: '<p>Является добычей для хищных птиц и млекопитающих. Роющая деятельность способствует аэрации почвы.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Данных о содержании практически нет. Предположительно требует сухой террариум с глубоким субстратом.</p>' },
                    { id: 'facts', title: 'Интересные факты', content: '<ul><li>Один из самых малоизученных видов хомяков.</li><li>Обладает одним из самых низких кариотипов среди хомяков (2n=20).</li></ul>' }
                ],
                sectionsShort: [
                    { id: 'systematics', title: 'Систематика', content: '<p>Вид описан в 1925 году Алленом. Относится к роду средних хомяков (Allocricetulus). Похож на хомячка Эверсманна, но немного мельче и светлее.</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Полупустыни Монголии и Северного Китая. Предпочитает гравийные равнины и закреплённые пески.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина тела 98–150 мм, хвоста 15–21 мм. Окраска очень светлая, брюхо, нижняя поверхность хвоста и лапы белые (тёмного пятна на груди нет). Волосяной покров ровный.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Активность в вечернее и ночное время. Живёт в норах.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Питается семенами злаков, солянок, караганы, мелкими насекомыми, иногда пресмыкающимися.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Сезон размножения в апреле. За лето 2–3 помёта по 4–9 детёнышей.</p>' },
                    { id: 'status', title: 'Статус сохранения', content: '<p>Вид недостаточно изучен.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Данных о содержании в неволе мало.</p>' }
                ]
            },
            // 7. Хомяк джунгарский
            {
                group: 'Карликовые хомяки (Phodopus)',
                nameRu: 'Хомяк джунгарский', nameLat: 'Phodopus sungorus', domestic: true,
                photos: { wild: 'images/sungorus_wild.jpg', zoo: 'images/sungorus_zoo.jpg', home: 'images/sungorus_home.jpg' },
                map: 'images/sungorus_map.png',
                sectionsFull: [
                    { id: 'systematics', title: 'Систематика и этимология', content: '<p>Описан Палласом в 1773 году. Видовой эпитет sungorus происходит от исторической области Джунгария. Относится к роду мохноногих хомячков (Phodopus).</p><p><strong>История изучения:</strong> Впервые описан П. С. Палласом во время его экспедиции по Сибири. С тех пор вид активно изучается в контексте сезонной адаптации и фотопериодической регуляции.</p><p><strong>Сравнение с хомяком Кэмпбелла:</strong> У джунгарского более выражена спинная полоса, сезонное посветление до белого, тогда как у Кэмпбелла окраска стабильна и полоса уже. Кариотип одинаков (2n=28), но гибриды фертильны только в лаборатории.</p>' },
                    { id: 'appearance', title: 'Внешний вид и адаптации', content: '<p>Длина до 10 см, масса 25–65 г. Шерсть густая, покрывает подошвы. Тёмная спинная полоса, короткий хвост. Зимой светлеет до белого — сезонный диморфизм, контролируемый фотопериодом. Кариотип 2n=28.</p>' },
                    { id: 'wild', title: 'В дикой природе', content: '<p>Джунгарские хомяки населяют сухие степи и полупустыни Западной Сибири, восточного Казахстана и Монголии. Живут в норах глубиной до 1 м, часто занимая готовые норы других грызунов. Ведут одиночный сумеречный и ночной образ жизни. На зиму не впадают в спячку, но могут впадать в оцепенение при сильных морозах. Одна из самых известных адаптаций — сезонная смена окраски: при сокращении светового дня летний серо-бурый мех сменяется белым зимним, что обеспечивает маскировку на снегу. В природе продолжительность жизни редко превышает 12 месяцев, однако в неволе может достигать 4 лет.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Одиночный, активен в сумерках и ночью. Самцы за ночь преодолевают в среднем 70 м, самки — 60 м. Норы имеют 2–6 входов и гнездовую камеру диаметром 10–15 см на глубине 20–30 см (зимой до 1 м). Взаимодействия между самцами и самками обычно агрессивны, тогда как однополые контакты более миролюбивы. В спячку не впадает, но может впадать в оцепенение.<br><strong>Химическая коммуникация:</strong> Боковые железы и моча используются для мечения. Запах позволяет опознавать пол и возраст.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>В основном питается семенами (70% рациона) и зелёными частями растений (30%); насекомых поедает относительно редко. Корм запасает в специальной камере внутри норы. В неволе склонен к диабету при избытке сахаров.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Основной сезон размножения с апреля по сентябрь, но некоторые самки размножаются и зимой. За сезон самка приносит 3–6 помётов, в каждом 4–6 детёнышей (в среднем). Беременность около 18 дней. Самцы помогают заботиться о потомстве. Половая зрелость в неволе наступает примерно в 4 месяца.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Популярный питомец. Требует просторную клетку с колесом, укрытиями. Склонен к диабету. Средняя продолжительность жизни 2,5 года.</p>' },
                    { id: 'facts', title: 'Интересные факты', content: '<ul><li>Сезонная смена окраски на белую — один из самых ярких примеров адаптации к снегу.</li><li>В неволе выведены окрасы: сапфир, жемчуг, мандарин.</li></ul>' }
                ],
                sectionsShort: [
                    { id: 'systematics', title: 'Систематика', content: '<p>Вид описан в 1773 году Палласом. Относится к роду мохноногих хомячков (Phodopus).</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Степи Западной Сибири, восточного Казахстана, Забайкалья. Населяет целинные степи, залежи, пастбища, речные долины. Живёт в норах глубиной до 1 м, часто занимает норы других грызунов.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина тела до 10 см, масса 25–65 г. Шерсть густая, покрывает также подошвы ног. Характерная тёмная полоса на спине, очень короткий хвост. Окрас буровато-серый, зимой светлеет до белого.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Ведёт одиночный образ жизни, активен в сумерках и ночью. В природе живёт около 12 месяцев, в неволе до 4 лет.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Питается семенами, зелёными частями растений, насекомыми.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Беременность 18–22 дня. В помёте 2–11 детёнышей (обычно 4–6). Может приносить потомство круглый год в неволе.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Популярное домашнее животное. Требует просторной клетки с колесом, укрытиями, минеральным камнем. Склонен к диабету при неправильном кормлении. Продолжительность жизни в среднем 2,5 года.</p>' }
                ]
            },
            // 8. Хомяк Кэмпбелла
            {
                group: 'Карликовые хомяки (Phodopus)',
                nameRu: 'Хомяк Кэмпбелла', nameLat: 'Phodopus campbelli', domestic: true,
                photos: { wild: 'images/campbelli_wild.jpg', zoo: null, home: 'images/campbelli_home.jpg' },
                map: null,
                sectionsFull: [
                    { id: 'systematics', title: 'Систематика и этимология', content: '<p>Описан Томасом в 1905 году, назван в честь Чарльза Кэмпбелла, собравшего первый экземпляр в Монголии 1 июля 1902 года. Относится к роду Phodopus.</p><p><strong>История изучения:</strong> Долгое время считался подвидом джунгарского хомяка. В конце XX века благодаря генетическим и морфологическим исследованиям признан отдельным видом.</p><p><strong>Сравнение с джунгарским:</strong> Меньше (до 103 мм), полоса уже, сезонное посветление отсутствует. Более социальный — живёт группами с иерархией.</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Сухие степи, полупустыни и пустыни Тувы, Бурятии, Забайкалья, Казахстана, Монголии, Северного Китая. Предпочитает разреженную растительность с куртинами караганы и полыней.</p>' },
                    { id: 'appearance', title: 'Внешний вид и отличия от джунгарика', content: '<p>Длина тела 79–103 мм, хвоста 7–14 мм, вес 23–28 г. Вдоль спины тянется чёрная полоса, но более узкая, чем у джунгарика. Окраска буроватая или серо-охристая, тремя угловатыми выступами вдаётся в светлую окраску боков. Отличается более светлым мехом и отсутствием выраженного сезонного посветления. Кариотип 2n=28.</p>' },
                    { id: 'wild', title: 'В дикой природе', content: '<p>Хомяк Кэмпбелла — обитатель сухих степей и полупустынь Центральной Азии. В отличие от большинства хомяков, в природе может жить небольшими группами или парами с выраженной социальной иерархией, хотя и сохраняет территориальность по отношению к чужакам. Активен преимущественно в сумерках, как и все виды рода Phodopus. Норы имеют 4–6 горизонтальных и вертикальных туннелей. Всеяден; питается семенами и насекомыми. В природе сезон размножения варьирует: в Туве начинается в середине апреля, в Монголии — ближе к концу апреля.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Сумеречный, активен круглый год. Социальная структура: пара или группа с доминантом. Гнездо выстилает сухой травой, перьями и шерстью. На Монгольском плато часто не роет собственных нор, а занимает норы песчанок (Meriones).<br><strong>Химическая коммуникация:</strong> Активно метит территорию. Запах используется для распознавания членов группы и чужаков.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Всеяден. В природе питается широким спектром семян (Stipa capillata, Iris ruthenia, Iris flavisima), орехов и растительности, а также насекомыми. В неволе склонен к ожирению при избытке жирных семян, таких как подсолнечник.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>В природе сезон размножения варьирует: в Туве начинается в середине апреля, в Монголии — ближе к концу апреля. В неволе размножается круглый год. Самки приносят 3–5 помётов в год. Беременность около 20 дней, в помёте 3–8 детёнышей. Половая зрелость наступает в два месяца. Отличается от джунгарского хомяка бипарентальной заботой о потомстве — самец активно участвует в выращивании выводка.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Популярное домашнее животное. Склонен к диабету. Рекомендуется содержание однополыми группами, сформированными в молодом возрасте. Продолжительность жизни 1,5–2,5 года.</p>' }
                ],
                sectionsShort: [
                    { id: 'systematics', title: 'Систематика', content: '<p>Вид описан в 1905 году Томасом, назван в честь Чарльза Уильяма Кэмпбелла. Относится к роду мохноногих хомячков (Phodopus).</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Сухие степи, полупустыни и пустыни Тувы, Бурятии, Забайкальского края, Казахстана, Монголии, Северного Китая. Предпочитает разреженную растительность с куртинами караганы, полыней.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина тела 65–100 мм, хвоста 8–15 мм. Вдоль спины тянется чёрная полоса. Буроватая или серо-охристая окраска меха спины тремя угловатыми выступами вдаётся в светлую окраску боков. От джунгарского хомяка отличается более светлым мехом и менее выраженной полосой на спине.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Ночное животное. В природе живёт небольшими группами или парами с чётко выраженным вожаком. Территориален по отношению к другим хомячкам своего вида.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Питается семенами, зелёными частями растений, насекомыми.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Беременность 18–20 дней. В помёте 3–8 детёнышей. Сезон размножения с апреля по сентябрь.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Популярное домашнее животное. Склонен к диабету. Рекомендуется содержание однополыми группами, сформированными в молодом возрасте. Продолжительность жизни 1,5–2,5 года.</p>' }
                ]
            },
            // 9. Хомяк Роборовского
            {
                group: 'Карликовые хомяки (Phodopus)',
                nameRu: 'Хомяк Роборовского', nameLat: 'Phodopus roborovskii', domestic: true,
                photos: { wild: 'images/roborovskii_wild.jpg', zoo: null, home: 'images/roborovskii_home.jpg' },
                map: 'images/roborovskii_map.png',
                sectionsFull: [
                    { id: 'systematics', title: 'Систематика и этимология', content: '<p>Описан Сатуниным в 1903 году. Назван в честь русского натуралиста и путешественника Всеволода Ивановича Роборовского. Относится к роду Phodopus и является самым мелким из трёх его видов.</p><p><strong>История изучения:</strong> Открыт в 1894 году, но описан позже. Благодаря своему маленькому размеру и быстрым движениям долго оставался загадкой для зоологов.</p><p><strong>Сравнение с другими Phodopus:</strong> Отличается отсутствием спинной полосы, наличием белых «бровей» и более светлым песочно-золотистым окрасом. Самый быстрый вид.</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Песчаные пустыни и полупустыни Монголии, Китая, прилегающих районов Тувы и Зайсанской котловины. Предпочитает слабозакреплённые пески, поросшие караганой, избегает песчаных дюн и глинистых участков.</p>' },
                    { id: 'appearance', title: 'Внешний вид и анатомия', content: '<p>Длина тела 4–5 см, масса 20–30 г. Самый мелкий из домашних хомяков. Песочно-золотистый верх, белый низ. Характерные белые пятна над глазами («брови»), отсутствие спинной полосы. Хвостик практически незаметен. Кариотип 2n=34.</p>' },
                    { id: 'wild', title: 'В дикой природе', content: '<p>Хомяк Роборовского населяет песчаные пустыни Центральной Азии. В отличие от многих других хомяков, может жить парами или небольшими группами. Активен в сумерках и ночью. Это самый быстрый вид хомяков — за ночь способен пробегать до 10 км. Отлично роет песок, строя разветвлённые норы. Питается преимущественно семенами пустынных растений, дополняя рацион насекомыми. В природе живёт около 2 лет, в неволе — до 4 лет.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Самый быстрый и подвижный из карликовых хомяков. Может жить парами или небольшими группами. Активен в сумерках и ночью. Строит простые норы из одного туннеля с гнездовой камерой. Активен круглый год, в спячку не впадает.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Преимущественно семенояден. Питается семенами пустынных растений, дополняя рацион насекомыми. В неволе нуждается в высоком содержании протеина.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Сезон размножения с марта по сентябрь, но в неволе может размножаться круглый год. Беременность 20 дней, в помёте 3–9 детёнышей. За год самка может принести до 4 выводков. Детёныши рождаются слепыми; на 11-й день покрываются шерстью, на 14-й открывают глаза. Отъём происходит в 20 дней.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Рекомендуются однополые группы в просторных вольерах с толстым слоем песка. Очень быстрые, легко ускользают. Продолжительность жизни 2–3 года.</p>' },
                    { id: 'facts', title: 'Интересные факты', content: '<ul><li>Самый маленький вид хомяков, содержащихся в неволе.</li><li>Из-за скорости и миниатюрности их называют «песчаными жемчужинами».</li></ul>' }
                ],
                sectionsShort: [
                    { id: 'systematics', title: 'Систематика', content: '<p>Вид описан в 1894 году Сатуниным. Назван в честь русского натуралиста В. И. Роборовского. Относится к роду мохноногих хомячков (Phodopus).</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Песчаные пустыни и полупустыни Монголии, Китая, прилегающих районов Тувы и Зайсанской котловины. Предпочитает слабозакреплённые пески, поросшие караганой, избегает песчаных дюн и глинистых участков.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина тела 4–5 см, масса 20–30 г. Голова и спина песочно-золотого цвета, живот белый. Характерные белые пятна, похожие на брови, отсутствие спинной полосы. Очень короткий хвостик, который практически незаметен.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Самый быстрый и подвижный из карликовых хомяков. Может жить парами или небольшими группами. Активен в сумерках и ночью.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Питается преимущественно семенами, насекомыми, зелёными частями растений.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Беременность 20–22 дня. В помёте 3–6 детёнышей. Детёныши рождаются слепыми и голыми, открывают глаза на 12–14 день.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Рекомендуется содержание однополыми группами в просторных вольерах с толстым слоем песка. Очень быстры, легко ускользают из рук. Продолжительность жизни 2–3 года.</p>' }
                ]
            },
            // 10. Хомячок китайский
            {
                group: 'Серые хомячки (Cricetulus)',
                nameRu: 'Хомячок китайский', nameLat: 'Cricetulus griseus', domestic: false,
                photos: { wild: 'images/griseus_wild.jpg', zoo: null, home: null },
                map: null,
                sectionsFull: [
                    { id: 'systematics', title: 'Систематика и этимология', content: '<p>Описан Милн-Эдвардсом в 1867 году. Видовой эпитет griseus означает «серый». Близок к барабинскому хомячку (Cricetulus barabensis).</p><p><strong>История изучения:</strong> Впервые описан по экземплярам из северного Китая. Долгое время использовался в лабораторной практике, особенно в биотехнологии.</p><p><strong>Сравнение с барабинским:</strong> Отличается более длинным хвостом и деталями окраса. Некоторыми систематиками рассматривается как его подвид. Кариотип 2n=22.</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Пустыни и полупустыни северного Китая и Монголии. Живёт в системах нор и туннелей с несколькими входами и отдельными камерами.</p>' },
                    { id: 'appearance', title: 'Внешний вид и анатомия', content: '<p>Длина тела 82–127 мм, хвоста 20–33 мм, масса 30–45 г. Тело стройное, хвост длинный, цепкий, что делает его похожим на мышь. Дикий окрас — коричневый с чёрной полосой вдоль спины и беловатым брюхом. Кариотип 2n=22.</p>' },
                    { id: 'wild', title: 'В дикой природе', content: '<p>Китайский хомячок — обитатель пустынь и полупустынь северного Китая и Монголии. Ведёт преимущественно ночной образ жизни, хотя может проявлять активность и днём короткими периодами. В отличие от большинства хомяков, хорошо лазает, чему способствует относительно длинный цепкий хвост. Живёт в сложных системах подземных туннелей с несколькими выходами и отдельными камерами для гнезда и запасов. Одиночное территориальное животное. Питается семенами, зелёными частями растений и насекомыми. В дикой природе живёт 2–3 года.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Ночной, но может быть активен и днём короткими периодами. Хорошо лазает благодаря цепкому хвосту, ведёт полудревесный образ жизни. В неволе может быть агрессивен к сородичам. В спячку не впадает, активен круглый год.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Основу рациона составляют семена, особенно горох, просо и соевые бобы. Также поедает зелёные части растений и насекомых.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Самки приносят 3–4 помёта в год. Беременность 18–23 дня, в помёте 3–8 детёнышей (обычно 4–6). Пик размножения приходится на тёплое время года, но в неволе может размножаться круглый год.</p>' },
                    { id: 'science', title: 'Использование в науке', content: '<p>Клетки яичников китайского хомячка (линия CHO) — важнейший инструмент биотехнологии для производства рекомбинантных белков. Вид используется в лабораторной практике с 1919 года.</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Содержится как домашнее животное относительно редко. Клетка должна быть с частыми прутьями, так как зверёк может пролезть сквозь широкие промежутки. Продолжительность жизни 2–3 года.</p>' }
                ],
                sectionsShort: [
                    { id: 'systematics', title: 'Систематика', content: '<p>Вид описан в 1867 году Милн-Эдвардсом. Относится к роду серых хомячков (Cricetulus). Близок к барабинскому хомячку (Cricetulus barabensis).</p>' },
                    { id: 'habitat', title: 'Ареал и среда обитания', content: '<p>Пустыни северного Китая и Монголии. Живёт в системах нор и туннелей с несколькими входами и отдельными камерами.</p>' },
                    { id: 'appearance', title: 'Внешний вид', content: '<p>Длина тела 82–127 мм, хвоста 20–33 мм, масса 30–45 г. Тело стройное, хвост длиннее, чем у других хомяков. Дикий окрас — коричневый с чёрной полосой вдоль спины и беловатым брюхом.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Ведёт ночной образ жизни. Хорошо лазает благодаря цепкому хвосту, ведёт полудревесный образ жизни.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Питается семенами, зелёными частями растений, насекомыми.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Беременность 20–21 день. В помёте 4–6 детёнышей.</p>' },
                    { id: 'science', title: 'Использование в науке', content: '<p>Широко используется как лабораторное животное, особенно в биотехнологии (клетки яичников китайского хомячка — линия CHO).</p>' },
                    { id: 'captivity', title: 'Содержание в неволе', content: '<p>Содержится как домашнее животное относительно редко. Клетка должна быть с частыми прутьями, так как зверёк может пролезть сквозь широкие промежутки. Продолжительность жизни 2–3 года.</p>' }
                ]
            },
            // 11. Хомячок длиннохвостый
            {
                group: 'Серые хомячки (Cricetulus)',
                nameRu: 'Хомячок длиннохвостый', nameLat: 'Cricetulus longicaudatus', domestic: false,
                photos: { wild: 'images/longicaudatus_wild.jpg', zoo: null, home: null },
                map: null,
                sectionsFull: [
                    { id: 'systematics', title: 'Систематика, этимология и эволюция', content: '<p>Описан Милн-Эдвардсом в 1867 году. Единственный представитель видовой группы longicaudatus рода Cricetulus. Этимология: Cricetulus — «маленький хомячок», longicaudatus — «длиннохвостый». Генетически ближе всего к барабинскому и соколовскому хомячкам; отделился от них в среднем плейстоцене. Шесть митохондриальных линий, наибольшее разнообразие на северо-востоке Тибета.</p><p><strong>Сравнение с китайским хомячком:</strong> Хвост значительно длиннее (до 48 мм), окраска более серая, уши с белыми кончиками. Кариотип 2n=24 (или 2n=28).</p>' },
                    { id: 'subspecies', title: 'Подвиды', content: '<ul><li><strong>C. l. longicaudatus</strong> — Восточный Казахстан, Россия (Тува, Забайкалье), Монголия, северный и центральный Китай.</li><li><strong>C. l. chiumalaiensis</strong> — эндемик южного Цинхая и Тибета (КНР).</li><li><strong>C. l. kozhantschikovi</strong> — юго-восток Красноярского края (Россия).</li></ul><p>Северные популяции генетически однообразны, но морфологически отличаются, что объясняется быстрой адаптацией в периферических изолятах.</p>' },
                    { id: 'appearance', title: 'Внешний вид и анатомия', content: '<p>Длина тела 80–135 мм, хвост 35–48 мм (до 46% длины). Масса 15–50 г. Окрас от песочно-коричневого до тёмно-серого, хвост двуцветный. Уши с белыми кончиками, подошвы частично опушены. Череп низкий, со вздутыми слуховыми барабанами. Кариотип 2n=24 (или 2n=28).</p>' },
                    { id: 'wild', title: 'В дикой природе', content: '<p>Длиннохвостый хомячок — один из наименее изученных видов хомяков. Обитает в горных степях Центральной Азии, предпочитая исключительно каменистые склоны, осыпи и скальные выходы на высотах до 1900 м. Ведёт ночной одиночный образ жизни. Строит неглубокие норы под камнями с 3–6 входными отверстиями; общая длина ходов может достигать 3 м. В отличие от многих хомяков, в спячку, по-видимому, не впадает. Запасает сено в «стожки», которые могут достигать 12 кг на одно убежище. Питается преимущественно семенами злаков, осок и дикого миндаля, дополняя рацион насекомыми. Продолжительность жизни в природе — до 2 лет.</p>' },
                    { id: 'behavior', title: 'Образ жизни и поведение', content: '<p>Ночной, одиночный, территориальный. В конце лета формирует «сенные стожки» для зимнего использования. Активен круглый год. В спячку, видимо, не впадает.</p>' },
                    { id: 'diet', title: 'Питание', content: '<p>Питается преимущественно семенами (осок, злаков, солянок, лапчатки, караганы), а также насекомыми (жуками и саранчовыми). Питательный состав рациона: клетчатка 19%, протеин 26%, углеводы 38%, жиры 8%.</p>' },
                    { id: 'reproduction', title: 'Размножение', content: '<p>Сезон размножения с марта по сентябрь. Самка приносит не менее двух помётов в год; перезимовавшие взрослые особи могут давать до трёх помётов. Беременность 18–21 день, в помёте 4–9 детёнышей (чаще 5–6). Глаза открываются на 12–14 день, лактация 3 недели. Продолжительность жизни в природе до 2 лет.</p>' },
